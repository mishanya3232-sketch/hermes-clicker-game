<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер Hermes – Улучшенная версия</title>
    <style>
        :root {
            --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --bg-color: #f5f5f5;
            --primary: #4CAF50;
            --primary-dark: #45a049;
            --danger: #8b4513;
            --warning: #ff9800;
            --info: #2196F3;
            --light: #fff;
            --dark: #333;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg-color);
            margin: 0;
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: var(--dark);
            margin-top: 10px;
            font-size: 1.8rem;
        }
        #bigCookie {
            width: min(200px, 80vw);
            height: min(200px, 80vw);
            max-width: 200px;
            max-height: 200px;
            background: var(--danger);
            border-radius: 50%;
            margin: 15px auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-size: calc(10px + 2vw);
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        #bigCookie:active {
            transform: scale(0.95);
        }
        #stats {
            margin: 15px 0;
            font-size: 1.2rem;
        }
        .buildings {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        .building {
            background: var(--primary);
            color: var(--light);
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
            min-width: 80px;
            box-sizing: border-box;
        }
        .building:hover {
            background: var(--primary-dark);
        }
        .building:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #achievements {
            margin-top: 20px;
            text-align: left;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
            font-size: 0.9rem;
        }
        .achievement {
            background: #ffeb3b;
            padding: 6px;
            margin: 4px 0;
            border-radius: 4px;
            display: none;
        }
        #prestigeBtn {
            background: var(--warning);
            color: var(--light);
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95rem;
            margin-top: 15px;
        }
        #prestigeBtn:hover {
            background: #e68900;
        }
        #prestigeBtn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #saveLoad {
            margin-top: 10px;
        }
        button.saveBtn {
            background: var(--info);
            color: var(--light);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 5px;
            font-size: 0.9rem;
        }
        button.saveBtn:hover {
            background: #0b7dda;
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            #stats { font-size: 1rem; }
            .building { padding: 8px 12px; font-size: 0.85rem; }
            #prestigeBtn { padding: 8px 14px; font-size: 0.85rem; }
            button.saveBtn { padding: 5px 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <h1>Кликер Hermes</h1>
    <div id="bigCookie">Кликни меня!</div>
    <div id="stats">
        Счёт: <span id="counter">0</span> <br>
        Кликов всего: <span id="totalClicks">0</span> <br>
        Множитель престижа: <span id="prestigeMult">1x</span>
    </div>
    <div class="buildings">
        <div class="building" id="buyCursor">Курсор (15)</div>
        <div class="building" id="buyGrandma">Бабушка (100)</div>
        <div class="building" id="buyFactory">Завод (500)</div>
        <div class="building" id="buyMine">Шахта (3000)</div>
    </div>
    <div id="achievements"></div>
    <button id="prestigeBtn">Престиж (Сбросить, +1 множитель за каждые 1M)</button>
    <div id="saveLoad">
        <button class="saveBtn" id="saveBtn">Сохранить</button>
        <button class="saveBtn" id="loadBtn">Загрузить</button>
    </div>

    <script>
        // Game state
        let count = 0; // total cookies (can be fractional)
        let totalClicks = 0; // number of manual clicks
        let prestigeLevel = 0;
        const prestigeBaseCost = 1e6;
        let prestigeCost = prestigeBaseCost;

        // Buildings: each has power per second
        const buildings = [
            {name: 'cursor', baseCost: 15, power: 0.1, owned: 0},
            {name: 'grandma', baseCost: 100, power: 1, owned: 0},
            {name: 'factory', baseCost: 500, power: 5, owned: 0},
            {name: 'mine', baseCost: 3000, power: 20, owned: 0}
        ];
        const buildingElements = {};

        // Achievements
        const achievements = [
            {id: 'firstClick', name: 'Первый клик', achieved: false},
            {id: 'hundredClicks', name: 'Сто кликов', achieved: false},
            {id: 'thousandClicks', name: 'Тысяча кликов', achieved: false},
            {id: 'millionClicks', name: 'Миллион кликов', achieved: false},
            {id: 'buyCursor', name: 'Первый курсор', achieved: false},
            {id: 'tenCursors', name: 'Десять курсоров', achieved: false},
            {id: 'hundredGrandma', name: 'Сто бабушек', achieved: false},
            {id: 'prestige1', name: 'Первый престиж', achieved: false},
            {id: 'prestige5', name: 'Пять престижей', achieved: false}
        ];
        const achievementElements = {};

        // DOM elements
        const counterEl = document.getElementById('counter');
        const totalClicksEl = document.getElementById('totalClicks');
        const prestigeMultEl = document.getElementById('prestigeMult');
        const cookie = document.getElementById('bigCookie');
        const prestigeBtn = document.getElementById('prestigeBtn');
        const achievementsDiv = document.getElementById('achievements');
        const saveBtn = document.getElementById('saveBtn');
        const loadBtn = document.getElementById('loadBtn');

        // Initialize building buttons
        buildings.forEach(b => {
            const el = document.getElementById(`buy${b.name.charAt(0).toUpperCase() + b.name.slice(1)}`);
            buildingElements[b.name] = el;
            el.addEventListener('click', () => buyBuilding(b));
        });

        // Click on cookie
        cookie.addEventListener('click', () => {
            count += 1 * (prestigeLevel + 1); // each click gives 1 * prestige multiplier
            totalClicks++;
            updateCounters();
            checkAchievements();
            // visual feedback
            cookie.style.transform = 'scale(0.95)';
            setTimeout(() => cookie.style.transform = 'scale(1)', 100);
        });

        // Prestige
        prestigeBtn.addEventListener('click', () => {
            if (count >= prestigeCost) {
                prestigeLevel++;
                // reset progress but keep prestige
                count = 0;
                buildings.forEach(b => b.owned = 0);
                prestigeCost = Math.floor(prestigeBaseCost * Math.pow(1.5, prestigeLevel));
                updateCursors();
                saveGame();
            }
        });

        // Save/load
        saveBtn.addEventListener('click', saveGame);
        loadBtn.addEventListener('click', loadGame);

        // Helper: format number with up to 1 decimal place, remove trailing zeros
        function formatNumber(num) {
            if (num >= 1e9) {
                return (num / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
            }
            if (num >= 1e6) {
                return (num / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
            }
            if (num >= 1e3) {
                return (num / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
            }
            // For small numbers, show up to 1 decimal place, strip .0
            return num.toFixed(1).replace(/\.0$/, '');
        }

        function updateCounters() {
            counterEl.textContent = formatNumber(count);
            totalClicksEl.textContent = totalClicks;
            prestigeMultEl.textContent = `x${prestigeLevel + 1}`;
            // update building buttons text and disabled state
            buildings.forEach(b => {
                const cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned));
                buildingElements[b.name].textContent = `${b.name.charAt(0).toUpperCase() + b.name.slice(1)} (${cost})`;
                buildingElements[b.name].disabled = count < cost;
            });
            prestigeBtn.disabled = count < prestigeCost;
            prestigeBtn.textContent = `Престиж (${formatNumber(count)}/${formatNumber(prestigeCost)})`;
        }

        function buyBuilding(b) {
            const cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned));
            if (count >= cost) {
                count -= cost;
                b.owned++;
                updateCursors();
                saveGame();
            }
        }

        function checkAchievements() {
            achievements.forEach(a => {
                if (!a.achieved) {
                    let conditionMet = false;
                    switch (a.id) {
                        case 'firstClick':
                            conditionMet = totalClicks >= 1;
                            break;
                        case 'hundredClicks':
                            conditionMet = totalClicks >= 100;
                            break;
                        case 'thousandClicks':
                            conditionMet = totalClicks >= 1000;
                            break;
                        case 'millionClicks':
                            conditionMet = totalClicks >= 1e6;
                            break;
                        case 'buyCursor':
                            conditionMet = buildings[0].owned >= 1;
                            break;
                        case 'tenCursors':
                            conditionMet = buildings[0].owned >= 10;
                            break;
                        case 'hundredGrandma':
                            conditionMet = buildings[1].owned >= 100;
                            break;
                        case 'prestige1':
                            conditionMet = prestigeLevel >= 1;
                            break;
                        case 'prestige5':
                            conditionMet = prestigeLevel >= 5;
                            break;
                    }
                    if (conditionMet) {
                        a.achieved = true;
                        showAchievement(a);
                    }
                }
            });
        }

        function showAchievement(ach) {
            const el = document.createElement('div');
            el.className = 'achievement';
            el.textContent = `🏆 ${ach.name}`;
            achievementElements[ach.id] = el;
            achievementsDiv.appendChild(el);
            // fade out after 3 seconds
            setTimeout(() => {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 600);
            }, 3000);
        }

        function saveGame() {
            const data = {
                count,
                totalClicks,
                prestigeLevel,
                prestigeCost,
                buildings: buildings.map(b => ({name: b.name, owned: b.owned})),
                achievements: achievements.filter(a => a.achieved).map(a => a.id)
            };
            localStorage.setItem('hermesClickerSave', JSON.stringify(data));
            // temporary feedback
            const originalText = saveBtn.textContent;
            saveBtn.textContent = 'Сохранено!';
            setTimeout(() => saveBtn.textContent = originalText, 1500);
        }

        function loadGame() {
            const saved = localStorage.getItem('hermesClickerSave');
            if (!saved) {
                alert('Нет сохранённой игры.');
                return;
            }
            const data = JSON.parse(saved);
            count = data.count || 0;
            totalClicks = data.totalClicks || 0;
            prestigeLevel = data.prestigeLevel || 0;
            prestigeCost = data.prestigeCost || prestigeBaseCost;
            if (data.buildings) {
                data.buildings.forEach(bd => {
                    const b = buildings.find(b => b.name === bd.name);
                    if (b) b.owned = bd.owned;
                });
            }
            if (data.achievements) {
                data.achievements.forEach(id => {
                    const ach = achievements.find(a => a.id === id);
                    if (ach) ach.achieved = true;
                });
            }
            updateCursors();
            // render achieved achievements
            achievements.filter(a => a.achieved).forEach(a => {
                if (!achievementElements[a.id]) showAchievement(a);
            });
            const originalText = loadBtn.textContent;
            loadBtn.textContent = 'Загружено!';
            setTimeout(() => loadBtn.textContent = originalText, 1500);
        }

        // Passive income per second
        setInterval(() => {
            let perSec = 0;
            buildings.forEach(b => {
                perSec += b.owned * b.power;
            });
            count += perSec * (prestigeLevel + 1);
            updateCursors();
            checkAchievements();
        }, 1000);

        // Initialize
        function init() {
            updateCursors();
            // attempt to load saved game
            const saved = localStorage.getItem('hermesClickerSave');
            if (saved) loadGame();
        }
        init();
    </script>
</body>
</html>
