<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер Hermes – Улучшенная версия</title>
    <style>
        :root {
            --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --bg-color: #f5f5f5;
            --primary: #4CAF50;
            --primary-dark: #45a049;
            --danger: #8b4513;
            --warning: #ff9800;
            --info: #2196F3;
            --light: #fff;
            --dark: #333;
            --gold: #ffd700;
            --tooltip-bg: rgba(0,0,0,0.75);
            --tooltip-color: #fff;
            --settings-bg: rgba(0,0,0,0.8);
            --settings-color: #fff;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg-color);
            margin: 0;
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: var(--dark);
            margin-top: 10px;
            font-size: 1.8rem;
        }
        #bigCookie {
            width: min(200px, 80vw);
            height: min(200px, 80vw);
            max-width: 200px;
            max-height: 200px;
            background: var(--danger);
            border-radius: 50%;
            margin: 15px auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-size: calc(10px + 2vw);
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        #bigCookie:active {
            transform: scale(0.95);
        }
        #goldenCookie {
            width: min(120px, 50vw);
            height: min(120px, 50vw);
            max-width: 120px;
            max-height: 120px;
            background: var(--gold);
            border-radius: 50%;
            margin: 10px auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            font-size: calc(8px + 1.5vw);
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s, opacity 0.2s;
            opacity: 0;
            pointer-events: none;
        }
        #goldenCookie.visible {
            opacity: 1;
            pointer-events: all;
        }
        #goldenCookie:active {
            transform: scale(0.9);
        }
        #stats {
            margin: 15px 0;
            font-size: 1.2rem;
        }
        .buildings {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        .building {
            background: var(--primary);
            color: var(--light);
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
            min-width: 80px;
            box-sizing: border-box;
        }
        .building:hover {
            background: var(--primary-dark);
        }
        .building:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #achievements {
            margin-top: 20px;
            text-align: left;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
            font-size: 0.9rem;
        }
        .achievement {
            background: #ffeb3b;
            padding: 6px;
            margin: 4px 0;
            border-radius: 4px;
            display: none;
        }
        #prestigeBtn {
            background: var(--warning);
            color: var(--light);
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95rem;
            margin-top: 15px;
        }
        #prestigeBtn:hover {
            background: #e68900;
        }
        #prestigeBtn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #hyperPrestigeBtn {
            background: var(--info);
            color: var(--light);
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
        #hyperPrestigeBtn:hover {
            background: #0b7dda;
        }
        #hyperPrestigeBtn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #saveLoad {
            margin-top: 10px;
        }
        button.saveBtn {
            background: var(--info);
            color: var(--light);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 5px;
            font-size: 0.9rem;
        }
        button.saveBtn:hover {
            background: #0b7dda;
        }
        #dailyTask {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #555;
        }
        #settingsBtn {
            background: var(--primary);
            color: var(--light);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        #settingsBtn:hover {
            background: var(--primary-dark);
        }
        #settingsPanel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--settings-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }
        #settingsPanel.show {
            display: flex;
        }
        .settings-content {
            background: var(--bg-color);
            color: var(--dark);
            padding: 20px;
            border-radius: 8px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            text-align: left;
        }
        .settings-content h2 {
            margin-top: 0;
        }
        .settings-content label {
            display: block;
            margin: 10px 0 5px;
        }
        .settings-content input[type="checkbox"] {
            margin-right: 5px;
        }
        .settings-content button {
            margin-top: 10px;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .settings-content button.export {
            background: var(--info);
            color: var(--light);
        }
        .settings-content button.import {
            background: var(--primary);
            color: var(--light);
        }
        .settings-content button.reset {
            background: var(--danger);
            color: var(--light);
        }
        .settings-content button.close {
            background: var(--warning);
            color: var(--light);
        }
        .settings-content button:hover {
            opacity: 0.9;
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            #stats { font-size: 1rem; }
            .building { padding: 8px 12px; font-size: 0.85rem; }
            #prestigeBtn { padding: 8px 14px; font-size: 0.85rem; }
            #hyperPrestigeBtn { padding: 8px 14px; font-size: 0.8rem; }
            button.saveBtn { padding: 5px 10px; font-size: 0.8rem; }
            #dailyTask { font-size: 0.8rem; }
            #settingsBtn { font-size: 0.8rem; padding: 4px 8px; }
            .settings-content { padding: 15px; }
        }
    </style>
</head>
<body>
    <h1>Кликер Hermes</h1>
    <div id="bigCookie">Кликни меня!</div>
    <div id="goldenCookie">Золотой печенье!</div>
    <div id="stats">
        Счёт: <span id="counter">0</span> <br>
        Кликов всего: <span id="totalClicks">0</span> <br>
        Множитель престижа: <span id="prestigeMult">1x</span> <br>
        Гипер‑множитель: <span id="hyperMult">1x</span> <br>
        Доход в сек: <span id="dps">0</span>
    </div>
    <div id="dailyTask"></div>
    <div class="buildings">
        <div class="building" id="buyCursor">Курсор (15)</div>
        <div class="building" id="buyGrandma">Бабушка (100)</div>
        <div class="building" id="buyFactory">Завод (500)</div>
        <div class="building" id="buyMine">Шахта (3000)</div>
        <div class="building" id="buyBank">Банк (15000)</div>
        <div class="building" id="buyTemple">Храм (100000)</div>
        <div class="building" id="buyWizard">Волшебник (400000)</div>
        <div class="building" id="buySpaceship">Космический корабль (2000000)</div>
    </div>
    <div id="achievements"></div>
    <button id="prestigeBtn">Престиж (Сбросить, +1 множитель за каждые 100k)</button>
    <button id="hyperPrestigeBtn">Гиперпрестиж (Сбросить престиж, +50% за уровень)</button>
    <div id="saveLoad">
        <button class="saveBtn" id="saveBtn">Сохранить</button>
        <button class="saveBtn" id="loadBtn">Загрузить</button>
    </div>
    <button id="settingsBtn">Настройки</button>

    <div id="settingsPanel">
        <div class="settings-content">
            <h2>Настройки</h2>
            <label>
                <input type="checkbox" id="soundToggle"> Звуковые эффекты
            </label>
            <label>
                <input type="checkbox" id="animationToggle"> Анимации
            </label>
            <br>
            <button class="exportBtn">Экспортировать сохранение</button>
            <button class="importBtn">Импортировать сохранение</button>
            <br>
            <button class="resetBtn" style="background:#dc3545;color:#white;">Сбросить всё (вкл. настройки)</button>
            <button class="closeBtn">Закрыть</button>
        </div>
    </div>

    <div id="tooltip"></div>

    <script>
        // Game state
        let count = 0; // total cookies (can be fractional)
        let totalClicks = 0; // number of manual clicks
        let prestigeLevel = 0;
        const prestigeBaseCost = 1000000; // 1,000,000 threshold for prestige
        let prestigeCost = prestigeBaseCost;
        let hyperPrestigeLevel = 0; // hyper prestige level

        // Settings
        let settings = {
            sound: true,
            animations: true
        };

        // Buildings: each has base power per second
        const buildings = [
            {name: 'cursor', displayName: 'Курсор', baseCost: 15, basePower: 0.1, owned: 0},
            {name: 'grandma', displayName: 'Бабушка', baseCost: 100, basePower: 1, owned: 0},
            {name: 'factory', displayName: 'Завод', baseCost: 500, basePower: 5, owned: 0},
            {name: 'mine', displayName: 'Шахта', baseCost: 3000, basePower: 20, owned: 0},
            {name: 'bank', displayName: 'Банк', baseCost: 15000, basePower: 100, owned: 0},
            {name: 'temple', displayName: 'Храм', baseCost: 100000, basePower: 400, owned: 0},
            {name: 'wizard', displayName: 'Волшебник', baseCost: 400000, basePower: 1600, owned: 0},
            {name: 'spaceship', displayName: 'Космический корабль', baseCost: 2000000, basePower: 6500, owned: 0}
        ];
        const buildingElements = {};

        // Achievements
        const achievements = [
            {id: 'firstClick', name: 'Первый клик', achieved: false},
            {id: 'hundredClicks', name: 'Сто кликов', achieved: false},
            {id: 'thousandClicks', name: 'Тысяча кликов', achieved: false},
            {id: 'millionClicks', name: 'Миллион кликов', achieved: false},
            {id: 'buyCursor', name: 'Первый курсор', achieved: false},
            {id: 'tenCursors', name: 'Десять курсоров', achieved: false},
            {id: 'hundredGrandma', name: 'Сто бабушек', achieved: false},
            {id: 'goldenClick', name: 'Клик по золотому печенью', achieved: false},
            {id: 'prestige1', name: 'Первый престиж', achieved: false},
            {id: 'prestige5', name: 'Пять престижей', achieved: false},
            {id: 'hyperPrestige1', name: 'Первый гиперпрестиж', achieved: false}
        ];
        const achievementElements = {};

        // DOM references
        const counterEl = document.getElementById('counter');
        const totalClicksEl = document.getElementById('totalClicks');
        const prestigeMultEl = document.getElementById('prestigeMult');
        const hyperMultEl = document.getElementById('hyperMult');
        const dpsEl = document.getElementById('dps');
        const dailyTaskEl = document.getElementById('dailyTask');
        const cookie = document.getElementById('bigCookie');
        const goldenCookie = document.getElementById('goldenCookie');
        const prestigeBtn = document.getElementById('prestigeBtn');
        const hyperPrestigeBtn = document.getElementById('hyperPrestigeBtn');
        const achievementsDiv = document.getElementById('achievements');
        const saveBtn = document.getElementById('saveBtn');
        const loadBtn = document.getElementById('loadBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const soundToggle = document.getElementById('soundToggle');
        const animationToggle = document.getElementById('animationToggle');
        const exportBtn = document.querySelector('.settings-content .exportBtn');
        const importBtn = document.querySelector('.settings-content .importBtn');
        const resetBtn = document.querySelector('.settings-content .resetBtn');
        const closeBtn = document.querySelector('.settings-content .closeBtn');
        const tooltipEl = document.getElementById('tooltip');

        // Initialize building elements
        buildings.forEach((b, idx) => {
            const el = document.getElementById(`buy${b.name.charAt(0).toUpperCase() + b.name.slice(1)}`);
            buildingElements[b.name] = el;
            el.addEventListener('click', () => buyBuilding(b));
            // Tooltip listeners
            el.addEventListener('mouseenter', (e) => showBuildingTooltip(e, b));
            el.addEventListener('mouseleave', hideTooltip);
        });

        // Click handler for regular cookie
        cookie.addEventListener('click', () => {
            count += 1 * (prestigeLevel + 1) * (1 + hyperPrestigeLevel * 0.5); // each click gives 1 * prestige multiplier * hyper multiplier
            totalClicks++;
            // visual feedback
            if (settings.animations) {
                cookie.style.transform = 'scale(0.95)';
                setTimeout(() => cookie.style.transform = 'scale(1)', 100);
            }
            updateUI();
            checkAchievements();
            // daily task progress
            progressDailyClick();
            playSound('click');
        });

        // Golden cookie handler
        goldenCookie.addEventListener('click', () => {
            if (goldenCookie.classList.contains('visible')) {
                // reward: 7 seconds of current CpS * prestige multiplier * hyper multiplier, plus a base bonus
                let baseCPS = 0;
                let cumulativeBonus = 0; // bonus multiplier from previous buildings
                for (let i = 0; i < buildings.length; i++) {
                    const b = buildings[i];
                    const effectivePower = b.basePower * (1 + cumulativeBonus);
                    baseCPS += b.owned * effectivePower;
                    cumulativeBonus += 0.05 * b.owned; // each level of current adds 5% to next
                }
                baseCPS *= (prestigeLevel + 1) * (1 + hyperPrestigeLevel * 0.5);
                const reward = Math.max(10, Math.floor(baseCPS * 7)) + Math.floor(Math.random() * 500);
                count += reward;
                totalClicks++;
                updateUI();
                hideGoldenCookie();
                showAchievementById('goldenClick');
                // visual feedback
                if (settings.animations) {
                    goldenCookie.style.transform = 'scale(0.8)';
                    setTimeout(() => goldenCookie.style.transform = 'scale(1)', 150);
                }
                playSound('golden');
            }
        });

        // Prestige
        prestigeBtn.addEventListener('click', () => {
            if (count >= prestigeCost) {
                prestigeLevel++;
                // reset everything except prestige level and achievements and hyper prestige level
                count = 0;
                totalClicks = 0;
                for (const b of buildings) {
                    b.owned = 0;
                }
                prestigeCost = Math.floor(prestigeBaseCost * Math.pow(1.5, prestigeLevel));
                updateUI();
                saveGame();
                // reset golden cookie timer? keep it running
                playSound('prestige');
                // update hyper prestige button visibility
                updateHyperPrestigeButton();
            }
        });

        // Hyper prestige
        hyperPrestigeBtn.addEventListener('click', () => {
            // Can hyper prestige if prestigeLevel >= 5
            if (prestigeLevel >= 5) {
                hyperPrestigeLevel++;
                // reset everything except hyper prestige level
                count = 0;
                totalClicks = 0;
                prestigeLevel = 0;
                prestigeCost = prestigeBaseCost;
                for (const b of buildings) {
                    b.owned = 0;
                }
                updateUI();
                saveGame();
                showAchievementById('hyperPrestige1');
                // visual feedback maybe
                playSound('prestige');
                // update hyper prestige button visibility (will hide if condition not met)
                updateHyperPrestigeButton();
            }
        });

        // Save/load/reset
        saveBtn.addEventListener('click', saveGame);
        loadBtn.addEventListener('click', loadGame);
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.add('show');
            // update checkboxes from stored settings
            soundToggle.checked = settings.sound;
            animationToggle.checked = settings.animations;
        });
        closeBtn.addEventListener('click', () => {
            settingsPanel.classList.remove('show');
        });
        exportBtn.addEventListener('click', exportSave);
        importBtn.addEventListener('click', importSave);
        resetBtn.addEventListener('click', () => {
            if (confirm('Вы уверены, что хотите сбросить всё, включая настройки? Это действие необратимо.')) {
                localStorage.clear();
                location.reload();
            }
        });

        // Helper to format large numbers with up to two decimal places, stripping unnecessary zeros
        function formatNumber(num) {
            if (num >= 1e9) {
                return (num / 1e9).toFixed(2).replace(/\.00$/, '').replace(/\.0$/, '') + 'B';
            }
            if (num >= 1e6) {
                return (num / 1e6).toFixed(2).replace(/\.00$/, '').replace(/\.0$/, '') + 'M';
            }
            if (num >= 1e3) {
                return (num / 1e3).toFixed(2).replace(/\.00$/, '').replace(/\.0$/, '') + 'K';
            }
            // For small numbers, show up to 2 decimal places, strip trailing zeros
            return num.toFixed(2).replace(/\.00$/, '').replace(/\.0$/, '');
        }

        // Update UI elements
        function updateUI() {
            counterEl.textContent = formatNumber(count);
            totalClicksEl.textContent = totalClicks;
            prestigeMultEl.textContent = `x${prestigeLevel + 1}`;
            hyperMultEl.textContent = `x${1 + hyperPrestigeLevel * 0.5}`;
            // building buttons text and disabled state
            for (const b of buildings) {
                const cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned));
                buildingElements[b.name].textContent = `${b.displayName} (${cost})`;
                buildingElements[b.name].disabled = count < cost;
            }
            // prestige button
            prestigeBtn.disabled = count < prestigeCost;
            prestigeBtn.textContent = `Престиж (${formatNumber(count)}/${formatNumber(prestigeCost)})`;
            // hyper prestige button
            updateHyperPrestigeButton();
            // DPS with cumulative bonus
            let totalBase = 0;
            let cumulativeBonus = 0;
            for (let i = 0; i < buildings.length; i++) {
                const b = buildings[i];
                const effectivePower = b.basePower * (1 + cumulativeBonus);
                totalBase += b.owned * effectivePower;
                cumulativeBonus += 0.05 * b.owned;
            }
            const totalDPS = totalBase * (prestigeLevel + 1) * (1 + hyperPrestigeLevel * 0.5);
            dpsEl.textContent = formatNumber(totalDPS);
            // daily task
            updateDailyTask();
        }

        // Buy building
        function buyBuilding(b) {
            const cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned));
            if (count >= cost) {
                count -= cost;
                b.owned++;
                updateUI();
                saveGame();
                playSound('build');
            }
        }

        // Achievement handling
        function checkAchievements() {
            for (const a of achievements) {
                if (!a.achieved) {
                    let achieved = false;
                    switch (a.id) {
                        case 'firstClick':
                            achieved = totalClicks >= 1;
                            break;
                        case 'hundredClicks':
                            achieved = totalClicks >= 100;
                            break;
                        case 'thousandClicks':
                            achieved = totalClicks >= 1000;
                            break;
                        case 'millionClicks':
                            achieved = totalClicks >= 1e6;
                            break;
                        case 'buyCursor':
                            achieved = buildings[0].owned >= 1;
                            break;
                        case 'tenCursors':
                            achieved = buildings[0].owned >= 10;
                            break;
                        case 'hundredGrandma':
                            achieved = buildings[1].owned >= 100;
                            break;
                        case 'goldenClick':
                            // will be set when golden cookie clicked
                            break;
                        case 'prestige1':
                            achieved = prestigeLevel >= 1;
                            break;
                        case 'prestige5':
                            achieved = prestigeLevel >= 5;
                            break;
                        case 'hyperPrestige1':
                            achieved = hyperPrestigeLevel >= 1;
                            break;
                    }
                    if (achieved) {
                        a.achieved = true;
                        showAchievement(a);
                    }
                }
            }
        }

        function showAchievement(ach) {
            const el = document.createElement('div');
            el.className = 'achievement';
            el.textContent = `🏆 ${ach.name}`;
            achievementElements[ach.id] = el;
            achievementsDiv.appendChild(el);
            // fade out after 3 seconds
            setTimeout(() => {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 600);
            }, 3000);
        }

        function showAchievementById(id) {
            const ach = achievements.find(a => a.id === id);
            if (ach && !ach.achieved) {
                ach.achieved = true;
                showAchievement(ach);
            }
        }

        // Save game to localStorage
        function saveGame() {
            const data = {
                count,
                totalClicks,
                prestigeLevel,
                hyperPrestigeLevel,
                buildings: buildings.map(b => ({name: b.name, owned: b.owned})),
                achievements: achievements.filter(a => a.achieved).map(a => a.id),
                settings: settings
            };
            localStorage.setItem('hermesClickerSave', JSON.stringify(data));
            // temporary feedback
            const original = saveBtn.textContent;
            saveBtn.textContent = 'Сохранено!';
            setTimeout(() => saveBtn.textContent = original, 1500);
        }

        // Load game from localStorage
        function loadGame() {
            const saved = localStorage.getItem('hermesClickerSave');
            if (!saved) {
                alert('Нет сохранённой игры.');
                return;
            }
            const data = JSON.parse(saved);
            count = data.count || 0;
            totalClicks = data.totalClicks || 0;
            prestigeLevel = data.prestigeLevel || 0;
            hyperPrestigeLevel = data.hyperPrestigeLevel || 0;
            prestigeCost = Math.floor(prestigeBaseCost * Math.pow(1.5, prestigeLevel));
            if (data.buildings) {
                data.buildings.forEach(bd => {
                    const b = buildings.find(b => b.name === bd.name);
                    if (b) b.owned = bd.owned;
                });
            }
            if (data.achievements) {
                data.achievements.forEach(id => {
                    const ach = achievements.find(a => a.id === id);
                    if (ach) ach.achieved = true;
                });
            }
            if (data.settings) {
                settings = data.settings;
                soundToggle.checked = settings.sound;
                animationToggle.checked = settings.animations;
            }
            updateUI();
            // show achieved achievements
            achievements.filter(a => a.achieved).forEach(a => {
                if (!achievementElements[a.id]) showAchievement(a);
            });
            const original = loadBtn.textContent;
            loadBtn.textContent = 'Загружено!';
            setTimeout(() => loadBtn.textContent = original, 1500);
        }

        // Export save as base64 string
        function exportSave() {
            const data = {
                count,
                totalClicks,
                prestigeLevel,
                hyperPrestigeLevel,
                buildings: buildings.map(b => ({name: b.name, owned: b.owned})),
                achievements: achievements.filter(a => a.achieved).map(a => a.id),
                settings: settings
            };
            const json = JSON.stringify(data);
            const base64 = btoa(json);
            const textarea = document.createElement('textarea');
            textarea.value = base64;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy').catch(() => {/* fallback for older browsers */});
            document.body.removeChild(textarea);
            alert('Скопировано в буфер обмена! Вставьте (Ctrl+V) чтобы сохранить где-то.');
        }

        // Import save from base64 string
        function importSave() {
            const base64 = prompt('Введите строку сохранения (base64):');
            if (!base64) return;
            try {
                const json = atob(base64);
                const data = JSON.parse(json);
                // Validate minimal structure
                if (typeof data.count !== 'number') throw new Error('Invalid save');
                count = data.count;
                totalClicks = data.totalClicks || 0;
                prestigeLevel = data.prestigeLevel || 0;
                hyperPrestigeLevel = data.hyperPrestigeLevel || 0;
                prestigeCost = Math.floor(prestigeBaseCost * Math.pow(1.5, prestigeLevel));
                if (data.buildings) {
                    data.buildings.forEach(bd => {
                        const b = buildings.find(b => b.name === bd.name);
                        if (b) b.owned = bd.owned;
                    });
                }
                if (data.achievements) {
                    data.achievements.forEach(id => {
                        const ach = achievements.find(a => a.id === id);
                        if (ach) ach.achieved = true;
                    });
                }
                if (data.settings) {
                    settings = data.settings;
                    soundToggle.checked = settings.sound;
                    animationToggle.checked = settings.animations;
                }
                updateUI();
                // show achieved achievements
                achievements.filter(a => a.achieved).forEach(a => {
                    if (!achievementElements[a.id]) showAchievement(a);
                });
                alert('Игра загружена!');
            } catch (e) {
                alert('Ошибка загрузки: ' + e.message);
            }
        }

        // Golden cookie spawning logic
        let goldenTimer = null;
        let goldenVisible = false;
        function startGoldenCookieTimer() {
            if (goldenTimer) clearTimeout(goldenTimer);
            const delay = Math.random() * (15000 - 5000) + 5000; // 5-15 seconds
            goldenTimer = setTimeout(() => {
                showGoldenCookie();
            }, delay);
        }
        function showGoldenCookie() {
            goldenCookie.classList.add('visible');
            goldenVisible = true;
            // hide after 3-8 seconds
            const hideDelay = Math.random() * 5000 + 3000;
            setTimeout(() => {
                hideGoldenCookie();
            }, hideDelay);
            // schedule next appearance
            startGoldenCookieTimer();
        }
        function hideGoldenCookie() {
            goldenCookie.classList.remove('visible');
            goldenVisible = false;
        }

        // Daily task logic
        const DAILY_KEY = 'hermesDaily';
        function getToday() { return new Date().toDateString(); }
        function initDaily() {
            const stored = localStorage.getItem(DAILY_KEY);
            let data;
            if (stored) {
                try { data = JSON.parse(stored); } catch { data = {}; }
            } else { data = {}; }
            if (!data.date || data.date !== getToday()) {
                const target = Math.floor(Math.random() * 50) + 50; // 50-99 clicks
                const reward = 1000; // fixed reward, could scale
                data = { date: getToday(), clicks: 0, target, reward };
                localStorage.setItem(DAILY_KEY, JSON.stringify(data));
            }
            return data;
        }
        function progressDailyClick() {
            const data = initDaily();
            data.clicks += 1;
            localStorage.setItem(DAILY_KEY, JSON.stringify(data));
            if (data.clicks >= data.target) {
                // grant reward
                count += data.reward;
                totalClicks++;
                updateUI();
                showAchievementById('goldenClick'); // reuse achievement or create new; we just show a toast
                // show a temporary message
                const msg = document.createElement('div');
                msg.style.position = 'fixed';
                msg.style.bottom = '20px';
                msg.style.left = '50%';
                msg.style.transform = 'translateX(-50%)';
                msg.style.background = 'rgba(0,150,0,0.8)';
                msg.style.color = '#fff';
                msg.style.padding = '8px 12px';
                msg.style.borderRadius = '4px';
                msg.style.fontSize = '0.9rem';
                msg.textContent = `Задача выполнена! +${formatNumber(data.reward)}`;
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
                // reset for next day (will be regenerated on next initDaily)
                localStorage.removeItem(DAILY_KEY);
            }
            updateDailyTask();
        }
        function updateDailyTask() {
            const data = initDaily();
            dailyTaskEl.textContent = `Ежедневная задача: ${data.clicks}/${data.target} кликов (награда: ${formatNumber(data.reward)})`;
        }

        // Tooltip logic
        function showBuildingTooltip(event, building) {
            // compute effective power with chain bonus from all previous buildings
            const idx = buildings.indexOf(building);
            let cumulativeBonus = 0;
            for (let j = 0; j < idx; j++) {
                cumulativeBonus += 0.05 * buildings[j].owned;
            }
            const effectivePower = building.basePower * (1 + cumulativeBonus);
            const cost = Math.floor(building.baseCost * Math.pow(1.15, building.owned));
            tooltipEl.innerHTML = `<strong>${building.displayName}</strong><br>Уровень: ${building.owned}<br>Базовая мощность/сек: ${building.basePower.toFixed(2)}<br>Бонус от предыдущих: ${(cumulativeBonus*100).toFixed(0)}%<br>Эффективная мощность/сек: ${effectivePower.toFixed(2)}<br>Следующая стоимость: ${formatNumber(cost)}`;
            const rect = event.target.getBoundingClientRect();
            tooltipEl.style.left = (rect.left + window.pageXOffset + rect.width / 2 - tooltipEl.offsetWidth / 2) + 'px';
            tooltipEl.style.top = (rect.top + window.pageYOffset - tooltipEl.offsetHeight - 10) + 'px';
            tooltipEl.style.opacity = '1';
        }
        function hideTooltip() {
            tooltipEl.style.opacity = '0';
        }

        // Sound logic using Web Audio API (beep)
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContext();
                } catch (e) {
                    console.warn('Web Audio API not supported', e);
                    return null;
                }
            }
            return audioCtx;
        }
        function playBeep(freq, durationMs) {
            const ctx = getAudioContext();
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.value = freq;
            gain.gain.value = 0.002; // volume
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + durationMs / 1000);
        }
        function playSound(type) {
            if (!settings.sound) return;
            switch (type) {
                case 'click': playBeep(440, 50); break;
                case 'build': playBeep(660, 50); break;
                case 'golden': playBeep(880, 80); break;
                case 'prestige': playBeep(520, 120); break;
            }
        }

        // Game loop for automatic income (every 100ms for smoothness)
        setInterval(() => {
            let totalBase = 0;
            let cumulativeBonus = 0;
            for (let i = 0; i < buildings.length; i++) {
                const b = buildings[i];
                const effectivePower = b.basePower * (1 + cumulativeBonus);
                totalBase += b.owned * effectivePower;
                cumulativeBonus += 0.05 * b.owned;
            }
            count += totalBase * (prestigeLevel + 1) * (1 + hyperPrestigeLevel * 0.5) / 10; // because interval is 0.1s
            updateUI();
            checkAchievements();
        }, 100);

        // Initialization
        function init() {
            updateUI();
            // Attempt to load saved game
            const saved = localStorage.getItem('hermesClickerSave');
            if (saved) loadGame();
            // start golden cookie timer
            startGoldenCookieTimer();
            // init daily task UI
            updateDailyTask();
            // update hyper prestige button visibility
            updateHyperPrestigeButton();
        }
        init();

        // Function to show/hide hyper prestige button based on prestigeLevel
        function updateHyperPrestigeButton() {
            if (prestigeLevel >= 5) {
                hyperPrestigeBtn.style.display = 'inline-block';
                hyperPrestigeBtn.disabled = false;
                hyperPrestigeBtn.textContent = `Гиперпрестиж (Сбросить престиж, +50% за уровень)`;
            } else {
                hyperPrestigeBtn.style.display = 'none';
            }
        }

        // Settings change listeners
        soundToggle.addEventListener('change', () => {
            settings.sound = soundToggle.checked;
        });
        animationToggle.addEventListener('change', () => {
            settings.animations = animationToggle.checked;
        });
    </script>
</body>
</html>
