<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер Hermes – Улучшенная версия</title>
    <style>
        :root {
            --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --bg-color: #f5f5f5;
            --primary: #4CAF50;
            --primary-dark: #45a049;
            --danger: #8b4513;
            --warning: #ff9800;
            --info: #2196F3;
            --light: #fff;
            --dark: #333;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg-color);
            margin: 0;
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: var(--dark);
            margin-top: 10px;
            font-size: 1.8rem;
        }
        #bigCookie {
            width: min(200px, 80vw);
            height: min(200px, 80vw);
            max-width: 200px;
            max-height: 200px;
            background: var(--danger);
            border-radius: 50%;
            margin: 15px auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-size: calc(10px + 2vw);
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        #bigCookie:active {
            transform: scale(0.95);
        }
        #stats {
            margin: 15px 0;
            font-size: 1.2rem;
        }
        .buildings {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        .building {
            background: var(--primary);
            color: var(--light);
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
            min-width: 80px;
            box-sizing: border-box;
        }
        .building:hover {
            background: var(--primary-dark);
        }
        .building:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #achievements {
            margin-top: 20px;
            text-align: left;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
            font-size: 0.9rem;
        }
        .achievement {
            background: #ffeb3b;
            padding: 6px;
            margin: 4px 0;
            border-radius: 4px;
            display: none;
        }
        #prestigeBtn {
            background: var(--warning);
            color: var(--light);
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95rem;
            margin-top: 15px;
        }
        #prestigeBtn:hover {
            background: #e68900;
        }
        #prestigeBtn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #saveLoad {
            margin-top: 10px;
        }
        button.saveBtn {
            background: var(--info);
            color: var(--light);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 5px;
            font-size: 0.9rem;
        }
        button.saveBtn:hover {
            background: #0b7dda;
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            #stats { font-size: 1rem; }
            .building { padding: 8px 12px; font-size: 0.85rem; }
            #prestigeBtn { padding: 8px 14px; font-size: 0.85rem; }
            button.saveBtn { padding: 5px 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <h1>Кликер Hermes</h1>
    <div id="bigCookie">Кликни меня!</div>
    <div id="stats">
        Счёт: <span id="counter">0</span> <br>
        Кликов всего: <span id="totalClicks">0</span> <br>
        Множитель престижа: <span id="prestigeMult">1x</span>
    </div>
    <div class="buildings">
        <div class="building" id="buyCursor">Курсор (15)</div>
        <div class="building" id="buyGrandma">Бабушка (100)</div>
        <div class="building" id="buyFactory">Завод (500)</div>
        <div class="building" id="buyMine">Шахта (3000)</div>
    </div>
    <div id="achievements"></div>
    <button id="prestigeBtn">Пре behaviour</button>
    <div id="saveLoad">
        <button class="saveBtn" id="saveBtn">Сохранить</button>
        <button class="saveBtn" id="loadBtn">Загрузить</button>
    </div>

    <script>
        let count = 0;
        let clickPower = 1;
        let cursorCount = 0;
        let grandmaCount = 0;
        let factoryCount = 0;
        let mineCount = 0;
        const cursorCost = 15;
        const grandmaCost = 100;
        const factoryCost = 500;
        const mineCost = 3000;
        const cursorPower = 0.1;
        const grandmaPower = 1;
        const factoryPower = 5;
        const minePower = 20;
        let prestigeLevel = 0;
        const prestigeBaseCost = 1e6; // cost to prestige
        let prestigeCost = prestigeBaseCost;

        const counterEl = document.getElementById('counter');
        const totalClicksEl = document.getElementById('totalClicks');
        const prestigeMultEl = document.getElementById('prestigeMult');
        const cookie = document.getElementById('bigCookie');
        const buyCursor = document.getElementById('buyCursor');
        const buyGrandma = document.getElementById('buyGrandma');
        const buyFactory = document.getElementById('buyFactory');
        const buyMine = document.getElementById('buyMine');
        const prestigeBtn = document.getElementById('prestigeBtn');
        const achievementsDiv = document.getElementById('achievements');
        const saveBtn = document.getElementById('saveBtn');
        const loadBtn = document.getElementById('loadBtn');

        let totalClicks = 0;
        let achievements = [];

        function formatNumber(num) {
            if (num >= 1e9) return (num/1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num/1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num/1e3).toFixed(1) + 'K';
            return num.toString();
        }

        function updateCounter() {
            counterEl.textContent = formatNumber(count);
            prestigeMultEl.textContent = `x${prestigeLevel + 1}`;
        }

        function updateTotalClicks() {
            totalClicksEl.textContent = totalClicks;
        }

        function cookieClick() {
            count += clickPower * (prestigeLevel + 1);
            totalClicks++;
            updateCounter();
            updateTotalClicks();
            checkAchievements();
        }

        cookie.addEventListener('click', cookieClick);

        function updateBuildingButtons() {
            buyCursor.disabled = count < cursorCost;
            buyGrandma.disabled = count < grandmaCost;
            buyFactory.disabled = count < factoryCost;
            buyMine.disabled = count < mineCost;
            prestigeBtn.disabled = count < prestigeCost;
        }

        function buyCursorFunc() {
            if (count >= cursorCost) {
                count -= cursorCost;
                cursorCount++;
                updateCounter();
                updateBuildingButtons();
            }
        }
        function buyGrandmaFunc() {
            if (count >= grandmaCost) {
                count -= grandmaCost;
                grandmaCount++;
                updateCounter();
                updateBuildingButtons();
            }
        }
        function buyFactoryFunc() {
            if (count >= factoryCost) {
                count -= factoryCost;
                factoryCount++;
                updateCounter();
                updateBuildingButtons();
            }
        }
        function buyMineFunc() {
            if (count >= mineCost) {
                count -= mineCost;
                mineCount++;
                updateCounter();
                updateBuildingButtons();
            }
        }
        function prestige() {
            if (count >= prestigeCost) {
                prestigeLevel++;
                count = 0;
                cursorCount = grandmaCount = factoryCount = mineCount = 0;
                prestigeCost = Math.floor(prestigeBaseCost * Math.pow(1.5, prestigeLevel));
                updateCounter();
                updateBuildingButtons();
                // reset achievements? keep them
            }
        }

        buyCursor.addEventListener('click', buyCursorFunc);
        buyGrandma.addEventListener('click', buyGrandmaFunc);
        buyFactory.addEventListener('click', buyFactoryFunc);
        buyMine.addEventListener('click', buyMineFunc);
        prestigeBtn.addEventListener('click', prestige);

        function createAchievement(text) {
            if (achievements.includes(text)) return;
            achievements.push(text);
            const el = document.createElement('div');
            el.className = 'achievement';
            el.textContent = `🏆 ${text}`;
            achievementsDiv.appendChild(el);
            el.style.display = 'block';
            // fade out after 5 sec
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 600); }, 5000);
        }

        function checkAchievements() {
            if (totalClicks >= 1 && !achievements.includes('Первый клик')) createAchievement('Первый клик');
            if (count >= 100 && !achievements.contains) { // simplified
                // we will implement a simple check list
            }
        }

        // passive income per second
        setInterval(() => {
            const perSec = (cursorCount * cursorPower + grandmaCount * grandmaPower + factoryCount * factoryPower + mineCount * minePower) * (prestigeLevel + 1);
            count += perSec;
            updateCounter();
            checkAchievements();
        }, 1000);

        // save/load
        function saveGame() {
            const data = {
                count,
                totalClicks,
                cursorCount,
                grandmaCount,
                factoryCount,
                mineCount,
                prestigeLevel,
                prestigeCost,
                achievements
            };
            localStorage.setItem('hermesClickerSave', JSON.stringify(data));
            alert('Игра сохранена!');
        }
        function loadGame() {
            const saved = localStorage.getItem('hermesClickerSave');
            if (saved) {
                const data = JSON.parse(saved);
                count = data.count || 0;
                totalClicks = data.totalClicks || 0;
                cursorCount = data.cursorCount || 0;
                grandmaCount = data.grandmaCount || 0;
                factoryCount = data.factoryCount || 0;
                mineCount = data.mineCount || 0;
                prestigeLevel = data.prestigeLevel || 0;
                prestigeCost = data.prestigeCost || prestigeBaseCost;
                achievements = data.achievements || [];
                updateCounter();
                updateTotalClicks();
                updateBuildingButtons();
                // render achievements
                achievementsDiv.innerHTML = '';
                achievements.forEach(txt => {
                    const el = document.createElement('div');
                    el.className = 'achievement';
                    el.textContent = `🏆 ${txt}`;
                    achievementsDiv.appendChild(el);
                });
                alert('Игра загружена!');
            } else {
                alert('Нет сохранённой игры.');
            }
        }
        saveBtn.addEventListener('click', saveGame);
        loadBtn.addEventListener('click', loadGame);

        // init
        function init() {
            updateCounter();
            updateTotalClicks();
            updateBuildingButtons();
        }
        init();
    </script>
</body>
</html>
