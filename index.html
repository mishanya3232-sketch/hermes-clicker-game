<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер Hermes – Улучшенная версия</title>
    <style>
        :root {
            --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --bg-color: #f5f5f5;
            --primary: #4CAF50;
            --primary-dark: #45a049;
            --danger: #8b4513;
            --warning: #ff9800;
            --info: #2196F3;
            --light: #fff;
            --dark: #333;
            --gold: #ffd700;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg-color);
            margin: 0;
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: var(--dark);
            margin-top: 10px;
            font-size: 1.8rem;
        }
        #bigCookie {
            width: min(200px, 80vw);
            height: min(200px, 80vw);
            max-width: 200px;
            max-height: 200px;
            background: var(--danger);
            border-radius: 50%;
            margin: 15px auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-size: calc(10px + 2vw);
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        #bigCookie:active {
            transform: scale(0.95);
        }
        #goldenCookie {
            width: min(120px, 50vw);
            height: min(120px, 50vw);
            max-width: 120px;
            max-height: 120px;
            background: var(--gold);
            border-radius: 50%;
            margin: 10px auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            font-size: calc(8px + 1.5vw);
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s, opacity 0.2s;
            opacity: 0;
            pointer-events: none;
        }
        #goldenCookie.visible {
            opacity: 1;
            pointer-events: all;
        }
        #goldenCookie:active {
            transform: scale(0.9);
        }
        #stats {
            margin: 15px 0;
            font-size: 1.2rem;
        }
        .buildings {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        .building {
            background: var(--primary);
            color: var(--light);
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
            min-width: 80px;
            box-sizing: border-box;
        }
        .building:hover {
            background: var(--primary-dark);
        }
        .building:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #achievements {
            margin-top: 20px;
            text-align: left;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
            font-size: 0.9rem;
        }
        .achievement {
            background: #ffeb3b;
            padding: 6px;
            margin: 4px 0;
            border-radius: 4px;
            display: none;
        }
        #prestigeBtn {
            background: var(--warning);
            color: var(--light);
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95rem;
            margin-top: 15px;
        }
        #prestigeBtn:hover {
            background: #e68900;
        }
        #prestigeBtn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #saveLoad {
            margin-top: 10px;
        }
        button.saveBtn {
            background: var(--info);
            color: var(--light);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 5px;
            font-size: 0.9rem;
        }
        button.saveBtn:hover {
            background: #0b7dda;
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            #stats { font-size: 1rem; }
            .building { padding: 8px 12px; font-size: 0.85rem; }
            #prestigeBtn { padding: 8px 14px; font-size: 0.85rem; }
            button.saveBtn { padding: 5px 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <h1>Кликер Hermes</h1>
    <div id="bigCookie">Кликни меня!</div>
    <div id="goldenCookie">Золотой печенье!</div>
    <div id="stats">
        Счёт: <span id="counter">0</span> <br>
        Кликов всего: <span id="totalClicks">0</span> <br>
        Множитель престижа: <span id="prestigeMult">1x</span> <br>
        Доход в сек: <span id="dps">0</span>
    </div>
    <div class="buildings">
        <div class="building" id="buyCursor">Курсор (15)</div>
        <div class="building" id="buyGrandma">Бабушка (100)</div>
        <div class="building" id="buyFactory">Завод (500)</div>
        <div class="building" id="buyMine">Шахта (3000)</div>
        <div class="building" id="buyBank">Банк (15000)</div>
        <div class="building" id="buyTemple">Храм (100000)</div>
        <div class="building" id="buyWizard">Волшебник (400000)</div>
        <div class="building" id="buySpaceship">Космический корабль (2000000)</div>
    </div>
    <div id="achievements"></div>
    <button id="prestigeBtn">Престиж (Сбросить, +1 множитель за каждые 100k)</button>
    <div id="saveLoad">
        <button class="saveBtn" id="saveBtn">Сохранить</button>
        <button class="saveBtn" id="loadBtn">Загрузить</button>
    </div>

    <script>
        // Game state
        let count = 0; // total cookies (can be fractional)
        let totalClicks = 0; // number of manual clicks
        let prestigeLevel = 0;
        const prestigeBaseCost = 100000; // 100k threshold for prestige
        let prestigeCost = prestigeBaseCost;

        // Buildings: each has power per second
        const buildings = [
            {name: 'cursor', displayName: 'Курсор', baseCost: 15, power: 0.1, owned: 0},
            {name: 'grandma', displayName: 'Бабушка', baseCost: 100, power: 1, owned: 0},
            {name: 'factory', displayName: 'Завод', baseCost: 500, power: 5, owned: 0},
            {name: 'mine', displayName: 'Шахта', baseCost: 3000, power: 20, owned: 0},
            {name: 'bank', displayName: 'Банк', baseCost: 15000, power: 100, owned: 0},
            {name: 'temple', displayName: 'Храм', baseCost: 100000, power: 400, owned: 0},
            {name: 'wizard', displayName: 'Волшебник', baseCost: 400000, power: 1600, owned: 0},
            {name: 'spaceship', displayName: 'Космический корабль', baseCost: 2000000, power: 6500, owned: 0}
        ];
        const buildingElements = {};

        // Achievements
        const achievements = [
            {id: 'firstClick', name: 'Первый клик', achieved: false},
            {id: 'hundredClicks', name: 'Сто кликов', achieved: false},
            {id: 'thousandClicks', name: 'Тысяча кликов', achieved: false},
            {id: 'millionClicks', name: 'Миллион кликов', achieved: false},
            {id: 'buyCursor', name: 'Первый курсор', achieved: false},
            {id: 'tenCursors', name: 'Десять курсоров', achieved: false},
            {id: 'hundredGrandma', name: 'Сто бабушек', achieved: false},
            {id: 'goldenClick', name: 'Клик по золотому печенью', achieved: false},
            {id: 'prestige1', name: 'Первый престиж', achieved: false},
            {id: 'prestige5', name: 'Пять престижей', achieved: false}
        ];
        const achievementElements = {};

        // DOM references
        const counterEl = document.getElementById('counter');
        const totalClicksEl = document.getElementById('totalClicks');
        const prestigeMultEl = document.getElementById('prestigeMult');
        const dpsEl = document.getElementById('dps');
        const cookie = document.getElementById('bigCookie');
        const goldenCookie = document.getElementById('goldenCookie');
        const prestigeBtn = document.getElementById('prestigeBtn');
        const achievementsDiv = document.getElementById('achievements');
        const saveBtn = document.getElementById('saveBtn');
        const loadBtn = document.getElementById('loadBtn');

        // Initialize building elements
        buildings.forEach(b => {
            const el = document.getElementById(`buy${b.name.charAt(0).toUpperCase() + b.name.slice(1)}`);
            buildingElements[b.name] = el;
            el.addEventListener('click', () => buyBuilding(b));
        });

        // Click handler for regular cookie
        cookie.addEventListener('click', () => {
            count += 1 * (prestigeLevel + 1); // each click gives 1 * prestige multiplier
            totalClicks++;
            // visual feedback
            cookie.style.transform = 'scale(0.95)';
            setTimeout(() => cookie.style.transform = 'scale(1)', 100);
        });

        // Golden cookie handler
        goldenCookie.addEventListener('click', () => {
            if (goldenCookie.classList.contains('visible')) {
                // reward: 7 seconds of current CpS * prestige multiplier, plus a base bonus
                let cps = 0;
                buildings.forEach(b => { cps += b.owned * b.power; });
                cps *= (prestigeLevel + 1);
                const reward = Math.max(10, cps * 7) + Math.floor(Math.random() * 500);
                count += reward;
                totalClicks++;
                updateUI();
                hideGoldenCookie();
                showAchievementById('goldenClick');
                // visual feedback
                goldenCookie.style.transform = 'scale(0.8)';
                setTimeout(() => goldenCookie.style.transform = 'scale(1)', 150);
            }
        });

        // Prestige
        prestigeBtn.addEventListener('click', () => {
            if (count >= prestigeCost) {
                prestigeLevel++;
                // reset everything except prestige level and achievements
                count = 0;
                totalClicks = 0;
                buildings.forEach(b => b.owned = 0);
                prestigeCost = Math.floor(prestigeBaseCost * Math.pow(1.5, prestigeLevel));
                updateUI();
                saveGame();
                // reset golden cookie timer? keep it running
            }
        });

        // Save/load/reset
        saveBtn.addEventListener('click', saveGame);
        loadBtn.addEventListener('click', loadGame);

        // Helper to format large numbers with up to two decimal places, stripping unnecessary zeros
        function formatNumber(num) {
            if (num >= 1e9) {
                return (num / 1e9).toFixed(2).replace(/\.00$/, '').replace(/\.0$/, '') + 'B';
            }
            if (num >= 1e6) {
                return (num / 1e6).toFixed(2).replace(/\.00$/, '').replace(/\.0$/, '') + 'M';
            }
            if (num >= 1e3) {
                return (num / 1e3).toFixed(2).replace(/\.00$/, '').replace(/\.0$/, '') + 'K';
            }
            // For small numbers, show up to 2 decimal places, strip trailing zeros
            return num.toFixed(2).replace(/\.00$/, '').replace(/\.0$/, '');
        }

        // Update UI elements
        function updateUI() {
            counterEl.textContent = formatNumber(count);
            totalClicksEl.textContent = totalClicks;
            prestigeMultEl.textContent = `x${prestigeLevel + 1}`;
            // building buttons text and disabled state
            buildings.forEach(b => {
                const cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned));
                buildingElements[b.name].textContent = `${b.displayName} (${cost})`;
                buildingElements[b.name].disabled = count < cost;
            });
            // prestige button
            prestigeBtn.disabled = count < prestigeCost;
            prestigeBtn.textContent = `Престиж (${formatNumber(count)}/${formatNumber(prestigeCost)})`;
            // DPS
            let dps = 0;
            buildings.forEach(b => {
                dps += b.owned * b.power;
            });
            dps *= (prestigeLevel + 1);
            dpsEl.textContent = formatNumber(dps);
        }

        // Buy building
        function buyBuilding(b) {
            const cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned));
            if (count >= cost) {
                count -= cost;
                b.owned++;
                updateUI();
                saveGame();
            }
        }

        // Achievement handling
        function checkAchievements() {
            achievements.forEach(a => {
                if (!a.achieved) {
                    let achieved = false;
                    switch (a.id) {
                        case 'firstClick':
                            achieved = totalClicks >= 1;
                            break;
                        case 'hundredClicks':
                            achieved = totalClicks >= 100;
                            break;
                        case 'thousandClicks':
                            achieved = totalClicks >= 1000;
                            break;
                        case 'millionClicks':
                            achieved = totalClicks >= 1e6;
                            break;
                        case 'buyCursor':
                            achieved = buildings[0].owned >= 1;
                            break;
                        case 'tenCursors':
                            achieved = buildings[0].owned >= 10;
                            break;
                        case 'hundredGrandma':
                            achieved = buildings[1].owned >= 100;
                            break;
                        case 'goldenClick':
                            // will be set when golden cookie clicked
                            break;
                        case 'prestige1':
                            achieved = prestigeLevel >= 1;
                            break;
                        case 'prestige5':
                            achieved = prestigeLevel >= 5;
                            break;
                    }
                    if (achieved) {
                        a.achieved = true;
                        showAchievement(a);
                    }
                }
            });
        }

        function showAchievement(ach) {
            const el = document.createElement('div');
            el.className = 'achievement';
            el.textContent = `🏆 ${ach.name}`;
            achievementElements[ach.id] = el;
            achievementsDiv.appendChild(el);
            // fade out after 3 seconds
            setTimeout(() => {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 600);
            }, 3000);
        }

        function showAchievementById(id) {
            const ach = achievements.find(a => a.id === id);
            if (ach && !ach.achieved) {
                ach.achieved = true;
                showAchievement(ach);
            }
        }

        // Save game to localStorage
        function saveGame() {
            const data = {
                count,
                totalClicks,
                prestigeLevel,
                buildings: buildings.map(b => ({name: b.name, owned: b.owned})),
                achievements: achievements.filter(a => a.achieved).map(a => a.id)
            };
            localStorage.setItem('hermesClickerSave', JSON.stringify(data));
            // temporary feedback
            const original = saveBtn.textContent;
            saveBtn.textContent = 'Сохранено!';
            setTimeout(() => saveBtn.textContent = original, 1500);
        }

        // Load game from localStorage
        function loadGame() {
            const saved = localStorage.getItem('hermesClickerSave');
            if (!saved) {
                alert('Нет сохранённой игры.');
                return;
            }
            const data = JSON.parse(saved);
            count = data.count || 0;
            totalClicks = data.totalClicks || 0;
            prestigeLevel = data.prestigeLevel || 0;
            prestigeCost = Math.floor(prestigeBaseCost * Math.pow(1.5, prestigeLevel));
            if (data.buildings) {
                data.buildings.forEach(bd => {
                    const b = buildings.find(b => b.name === bd.name);
                    if (b) b.owned = bd.owned;
                });
            }
            if (data.achievements) {
                data.achievements.forEach(id => {
                    const ach = achievements.find(a => a.id === id);
                    if (ach) ach.achieved = true;
                });
            }
            updateUI();
            // show achieved achievements
            achievements.filter(a => a.achieved).forEach(a => {
                if (!achievementElements[a.id]) showAchievement(a);
            });
            const original = loadBtn.textContent;
            loadBtn.textContent = 'Загружено!';
            setTimeout(() => loadBtn.textContent = original, 1500);
        }

        // Golden cookie spawning logic
        let goldenTimer = null;
        let goldenVisible = false;
        function startGoldenCookieTimer() {
            if (goldenTimer) clearTimeout(goldenTimer);
            const delay = Math.random() * (30000 - 10000) + 10000; // 10-30 seconds
            goldenTimer = setTimeout(() => {
                showGoldenCookie();
            }, delay);
        }
        function showGoldenCookie() {
            goldenCookie.classList.add('visible');
            goldenVisible = true;
            // hide after 5-10 seconds
            const hideDelay = Math.random() * 5000 + 5000;
            setTimeout(() => {
                hideGoldenCookie();
            }, hideDelay);
            // schedule next appearance
            startGoldenCookieTimer();
        }
        function hideGoldenCookie() {
            goldenCookie.classList.remove('visible');
            goldenVisible = false;
        }

        // Game loop for automatic income (every 100ms for smoothness)
        setInterval(() => {
            let passive = 0;
            buildings.forEach(b => {
                passive += b.owned * b.power;
            });
            count += passive * (prestigeLevel + 1) / 10; // because interval is 0.1s
            updateUI();
            checkAchievements();
        }, 100);

        // Initialization
        function init() {
            updateUI();
            // Attempt to load saved game
            const saved = localStorage.getItem('hermesClickerSave');
            if (saved) loadGame();
            // start golden cookie timer
            startGoldenCookieTimer();
        }
        init();
    </script>
</body>
</html>
