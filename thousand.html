            deck = [];
            suits.forEach(s => {
                ranks.forEach(r => {
                    deck.push({suit: s, rank: r.name, value: r.value});
                });

            // Fisher-Yates shuffle
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
